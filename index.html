    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WorthIt Goods • Products Actually Worth Buying" />
    <meta name="twitter:description" content="Honest, hand-picked products that actually deliver. No junk. No hype. Just gear worth your money and time." />
    <meta name="twitter:image" content="https://www.worthitgoods.com/assets/og-image-v2.jpg" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
<div class="hero-content">
<h1>WorthIt Goods</h1>
<p>Products Actually Worth Buying</p>
</div>
</div>
    
    <!-- This is where the generated grid lives -->
    <section id="products" style="padding:40px 20px; max-width:1200px; margin:0 auto;">
        <!-- GENERATED CONTENT FROM build.sh GOES HERE -->
    </section>

    <!-- NEWSLETTER SIGNUP -->
    <section id="newsletter" style="padding:40px 20px; max-width:700px; margin:0 auto; text-align:center;">
        <h2 style="font-size:1.6rem; margin-bottom:0.5rem;">Get the Weekly Worth-It List</h2>
        <p style="color:#6b7280; margin-bottom:1.5rem;">One email a week. The best products we found, why they're worth it, and nothing else. No fluff, no spam.</p>
        <form id="newsletter-form" style="display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:center; max-width:500px; margin:0 auto;">
            <input type="email" name="email" placeholder="you@email.com" required style="flex:1; min-width:220px; padding:12px 16px; border:2px solid #d1d5db; border-radius:8px; font-size:1rem;">
            <input type="hidden" name="source" value="worthitgoods-newsletter">
            <button type="submit" style="padding:12px 24px; background:#16a34a; color:white; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer;">Subscribe</button>
        </form>
        <p id="newsletter-msg" style="margin-top:1rem; font-size:0.9rem; display:none;"></p>
        <p style="color:#9ca3af; font-size:0.8rem; margin-top:0.5rem;">Join %(subscriber_count)s readers. Unsubscribe anytime.</p>
    </section>

    <style>
    #newsletter-form input:focus { outline:none; border-color:#16a34a; }
    #newsletter-form button:hover { background:#15803d; }
    #newsletter-msg.success { color:#16a34a; }
    #newsletter-msg.error { color:#dc2626; }
    </style>
    <script>
    (function() {
        var form = document.getElementById('newsletter-form');
        if (!form) return;
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            var email = form.email.value;
            var btn = form.querySelector('button');
            btn.disabled = true; btn.textContent = 'Subscribing...';
            fetch('https://api.shaynesailab.com/api/newsletter-signup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email, source: 'worthitgoods-newsletter', name: '', company: '', message: 'Newsletter signup', timeline: ''})
            })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                var msg = document.getElementById('newsletter-msg');
                msg.textContent = "You're in. Check your inbox for a confirmation.";
                msg.className = 'success'; msg.style.display = 'block';
                form.reset(); form.style.display = 'none';
            })
            .catch(function() {
                var msg = document.getElementById('newsletter-msg');
                msg.textContent = 'Something went wrong. Email shayne@worthitgoods.com directly.';
                msg.className = 'error'; msg.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Subscribe';
            });
        });
    })();
    </script>

</body>
</html>
